<script>
  const title = document.getElementById('title');
  const slug = document.getElementById('slug');
  const date = document.getElementById('date');
  const content = document.getElementById('content');
  const output = document.getElementById('output');
  const previewBtn = document.getElementById('previewBtn');
  const copyBtn = document.getElementById('copyBtn');
  const publishBtn = document.getElementById('publishBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const statusEl = document.getElementById('status');
  const resultBox = document.getElementById('resultBox');

  const uploadBtn = document.getElementById('uploadBtn');
  const mediaFile = document.getElementById('mediaFile');
  const mediaUrl = document.getElementById('mediaUrl');

  const isoNow = new Date().toISOString();
  date.value = isoNow;

  function makeSlug(value) {
    return value.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }

  function getToken() {
    return localStorage.getItem('stiu_token') || '';
  }

  function setStatus() {
    statusEl.textContent = getToken() ? 'Signed in with GitHub.' : 'Not signed in.';
  }

  title.addEventListener('input', () => {
    if (!slug.dataset.edited) slug.value = makeSlug(title.value);
  });

  slug.addEventListener('input', () => {
    slug.dataset.edited = '1';
  });

  function buildMarkdown() {
    const t = title.value.trim() || 'Untitled Post';
    const d = date.value.trim() || new Date().toISOString();
    const body = content.value.trim() || 'Write here.';
    return `---
title: "${t.replace(/"/g, '\\"')}"
date: "${d}"
---
${body}
`;
  }

  if (location.hash.startsWith('#token=')) {
    const token = decodeURIComponent(location.hash.slice('#token='.length));
    localStorage.setItem('stiu_token', token);
    history.replaceState(null, '', '/admin');
  }

  setStatus();

  previewBtn.addEventListener('click', () => {
    output.value = buildMarkdown();
  });

  copyBtn.addEventListener('click', async () => {
    output.value = buildMarkdown();
    await navigator.clipboard.writeText(output.value);
    copyBtn.textContent = 'Copied';
    setTimeout(() => (copyBtn.textContent = 'Copy markdown'), 1200);
  });

  logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('stiu_token');
    setStatus();
    resultBox.textContent = 'Local token removed.';
  });

  uploadBtn.addEventListener('click', async () => {
    const file = mediaFile.files[0];
    if (!file) {
      resultBox.textContent = 'Please choose a file first.';
      return;
    }

    const formData = new FormData();
    formData.append('file', file);

    resultBox.textContent = 'Uploading file...';

    const resp = await fetch('/api/media/upload', {
      method: 'POST',
      body: formData
    });

    const data = await resp.json();

    if (!resp.ok) {
      resultBox.textContent = 'Upload failed: ' + JSON.stringify(data);
      return;
    }

    mediaUrl.value = data.url;
    resultBox.textContent = 'Uploaded: ' + data.url;
  });

  publishBtn.addEventListener('click', async () => {
    const token = getToken();
    if (!token) {
      resultBox.textContent = 'Please sign in with GitHub first.';
      return;
    }

    output.value = buildMarkdown();
    resultBox.textContent = 'Publishing...';

    const resp = await fetch('/api/posts/publish', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: 'Bearer ' + token
      },
      body: JSON.stringify({
        title: title.value,
        slug: slug.value,
        date: date.value,
        content: content.value
      })
    });

    const data = await resp.json();

    if (!resp.ok) {
      resultBox.textContent = 'Publish failed: ' + JSON.stringify(data);
      return;
    }

    resultBox.textContent = `Published: ${data.path}`;
  });
</script>
